services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: spec_streaming
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:11
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/flyway/sql
    command: -url=jdbc:postgresql://postgres:5432/spec_streaming -user=postgres -password=postgres migrate

volumes:
  postgres_data:
